name: GUI Build (Linux + Windows)

on:
  push:
    paths:
      - 'gui-esp32s3-simulator/**'
      - '.github/workflows/gui-build-linux-windows.yml'
  pull_request:
    paths:
      - 'gui-esp32s3-simulator/**'
      - '.github/workflows/gui-build-linux-windows.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    env:
      BUILD_DIR: gui-esp32s3-simulator/build-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev

      - name: Configure
        run: |
          cmake -E rm -rf "$BUILD_DIR"
          cmake -S gui-esp32s3-simulator -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build "$BUILD_DIR" --config Release -j 4

      - name: Test
        run: ctest --test-dir "$BUILD_DIR" --output-on-failure -C Release
