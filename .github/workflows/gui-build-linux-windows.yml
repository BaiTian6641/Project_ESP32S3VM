name: GUI Build (Linux + Windows + macOS)

on:
  push:
    paths:
      - 'gui-esp32s3-simulator/**'
      - '.github/workflows/gui-build-linux-windows.yml'
  pull_request:
    paths:
      - 'gui-esp32s3-simulator/**'
      - '.github/workflows/gui-build-linux-windows.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    env:
      BUILD_DIR: gui-esp32s3-simulator/build-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (Windows/macOS)
        if: runner.os == 'Windows' || runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev

      - name: Configure
        shell: bash
        run: |
          cmake -E rm -rf "${{ env.BUILD_DIR }}"
          cmake -S gui-esp32s3-simulator -B "${{ env.BUILD_DIR }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: cmake --build "${{ env.BUILD_DIR }}" --config Release -j 4

      - name: Test
        shell: bash
        run: ctest --test-dir "${{ env.BUILD_DIR }}" --output-on-failure -C Release

      - name: Package Runtime Artifact
        shell: bash
        run: |
          set -euo pipefail

          PKG_ROOT="dist/gui-esp32s3-simulator-${{ runner.os }}"
          mkdir -p "$PKG_ROOT"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            GUI_BIN="${{ env.BUILD_DIR }}/Release/gui_esp32s3_simulator.exe"
            if [[ ! -f "$GUI_BIN" ]]; then
              GUI_BIN="${{ env.BUILD_DIR }}/gui_esp32s3_simulator.exe"
            fi
            cp "$GUI_BIN" "$PKG_ROOT/"

            DEPLOY_QT=""
            if command -v windeployqt >/dev/null 2>&1; then
              DEPLOY_QT="windeployqt"
            elif command -v windeployqt6 >/dev/null 2>&1; then
              DEPLOY_QT="windeployqt6"
            else
              echo "windeployqt not found in PATH"
              exit 1
            fi

            "$DEPLOY_QT" --release --no-compiler-runtime --no-translations --dir "$PKG_ROOT" "$PKG_ROOT/gui_esp32s3_simulator.exe"

            test -f "$PKG_ROOT/Qt6Core.dll"
            test -f "$PKG_ROOT/Qt6Gui.dll"
            test -f "$PKG_ROOT/Qt6Widgets.dll"
            test -f "$PKG_ROOT/Qt6Network.dll"
            test -f "$PKG_ROOT/platforms/qwindows.dll"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            GUI_APP="${{ env.BUILD_DIR }}/gui_esp32s3_simulator.app"
            if [[ ! -d "$GUI_APP" ]]; then
              echo "Expected app bundle not found: $GUI_APP"
              exit 1
            fi

            cp -R "$GUI_APP" "$PKG_ROOT/"

            DEPLOY_QT=""
            if command -v macdeployqt >/dev/null 2>&1; then
              DEPLOY_QT="macdeployqt"
            else
              echo "macdeployqt not found in PATH"
              exit 1
            fi

            "$DEPLOY_QT" "$PKG_ROOT/gui_esp32s3_simulator.app"

            test -d "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks/QtCore.framework"
            test -d "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks/QtGui.framework"
            test -d "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks/QtWidgets.framework"
            test -d "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks/QtNetwork.framework"
          else
            cp "${{ env.BUILD_DIR }}/gui_esp32s3_simulator" "$PKG_ROOT/"
            chmod +x "$PKG_ROOT/gui_esp32s3_simulator"

            mapfile -t QT_LIBS < <(ldd "$PKG_ROOT/gui_esp32s3_simulator" \
              | awk '/=>/ && /libQt6/ {print $3}' \
              | sed '/^$/d' \
              | sort -u)
            if [[ ${#QT_LIBS[@]} -eq 0 ]]; then
              echo "No Qt runtime libraries found via ldd"
              exit 1
            fi

            for so in "${QT_LIBS[@]}"; do
              cp "$so" "$PKG_ROOT/"
            done

            QT_PLUGIN_BASE="/usr/lib/x86_64-linux-gnu/qt6/plugins"
            mkdir -p "$PKG_ROOT/platforms"
            cp "$QT_PLUGIN_BASE/platforms/libqxcb.so" "$PKG_ROOT/platforms/"
            if [[ -d "$QT_PLUGIN_BASE/platformthemes" ]]; then
              mkdir -p "$PKG_ROOT/platformthemes"
              cp -a "$QT_PLUGIN_BASE/platformthemes/." "$PKG_ROOT/platformthemes/"
            fi
            if [[ -d "$QT_PLUGIN_BASE/styles" ]]; then
              mkdir -p "$PKG_ROOT/styles"
              cp -a "$QT_PLUGIN_BASE/styles/." "$PKG_ROOT/styles/"
            fi

            {
              printf '%s\n' '[Paths]'
              printf '%s\n' 'Prefix=.'
              printf '%s\n' 'Plugins=.'
            } > "$PKG_ROOT/qt.conf"

            test -f "$PKG_ROOT/libQt6Core.so.6"
            test -f "$PKG_ROOT/libQt6Gui.so.6"
            test -f "$PKG_ROOT/libQt6Widgets.so.6"
            test -f "$PKG_ROOT/libQt6Network.so.6"
            test -f "$PKG_ROOT/platforms/libqxcb.so"
          fi

          cp -r gui-esp32s3-simulator/peripherals "$PKG_ROOT/"
          cp -r gui-esp32s3-simulator/device-sims "$PKG_ROOT/"
          cp gui-esp32s3-simulator/README.md "$PKG_ROOT/README.gui.md"

          QEMU_STATUS_FILE="$PKG_ROOT/qemu-binary-status.txt"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            if [[ -f "qemu/build/qemu-system-xtensa.exe" ]]; then
              mkdir -p "$PKG_ROOT/qemu"
              cp "qemu/build/qemu-system-xtensa.exe" "$PKG_ROOT/qemu/"
              echo "included=qemu/build/qemu-system-xtensa.exe" > "$QEMU_STATUS_FILE"
            else
              echo "included=none" > "$QEMU_STATUS_FILE"
              echo "note=Set ESP32S3_QEMU_BIN to a Windows qemu-system-xtensa.exe path." >> "$QEMU_STATUS_FILE"
            fi

            {
              printf '%s\n' '@echo off'
              printf '%s\n' 'setlocal'
              printf '%s\n' 'set "SCRIPT_DIR=%~dp0"'
              printf '%s\n' 'if exist "%SCRIPT_DIR%qemu\qemu-system-xtensa.exe" ('
              printf '%s\n' '  set "ESP32S3_QEMU_BIN=%SCRIPT_DIR%qemu\qemu-system-xtensa.exe"'
              printf '%s\n' '  echo [launcher] Using bundled QEMU: %ESP32S3_QEMU_BIN%'
              printf '%s\n' ') else ('
              printf '%s\n' '  echo [launcher] Bundled QEMU not found. Set ESP32S3_QEMU_BIN if needed.'
              printf '%s\n' ')'
              printf '%s\n' '"%SCRIPT_DIR%gui_esp32s3_simulator.exe"'
              printf '%s\n' 'endlocal'
            } > "$PKG_ROOT/run-gui.cmd"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "included=none" > "$QEMU_STATUS_FILE"
            echo "note=Set ESP32S3_QEMU_BIN to a macOS qemu-system-xtensa path." >> "$QEMU_STATUS_FILE"

            {
              printf '%s\n' '#!/usr/bin/env bash'
              printf '%s\n' 'set -euo pipefail'
              printf '%s\n' 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"'
              printf '%s\n' 'exec open "$SCRIPT_DIR/gui_esp32s3_simulator.app"'
            } > "$PKG_ROOT/run-gui.command"
            chmod +x "$PKG_ROOT/run-gui.command"
          else
            if [[ -f "qemu/build/qemu-system-xtensa" ]]; then
              mkdir -p "$PKG_ROOT/qemu"
              cp "qemu/build/qemu-system-xtensa" "$PKG_ROOT/qemu/"
              chmod +x "$PKG_ROOT/qemu/qemu-system-xtensa"
              echo "included=qemu/build/qemu-system-xtensa" > "$QEMU_STATUS_FILE"
            else
              echo "included=none" > "$QEMU_STATUS_FILE"
              echo "note=Set ESP32S3_QEMU_BIN to a Linux qemu-system-xtensa path." >> "$QEMU_STATUS_FILE"
            fi

            {
              printf '%s\n' '#!/usr/bin/env bash'
              printf '%s\n' 'set -euo pipefail'
              printf '%s\n' 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"'
              printf '%s\n' ''
              printf '%s\n' 'if [[ -x "$SCRIPT_DIR/qemu/qemu-system-xtensa" ]]; then'
              printf '%s\n' '  export ESP32S3_QEMU_BIN="$SCRIPT_DIR/qemu/qemu-system-xtensa"'
              printf '%s\n' '  echo "[launcher] Using bundled QEMU: $ESP32S3_QEMU_BIN"'
              printf '%s\n' 'else'
              printf '%s\n' '  echo "[launcher] Bundled QEMU not found. Set ESP32S3_QEMU_BIN if needed."'
              printf '%s\n' 'fi'
              printf '%s\n' ''
              printf '%s\n' 'exec "$SCRIPT_DIR/gui_esp32s3_simulator"'
            } > "$PKG_ROOT/run-gui.sh"
            chmod +x "$PKG_ROOT/run-gui.sh"
          fi

          {
            printf '%s\n' "GUI runtime package for ${{ runner.os }}"
            printf '%s\n' '- Contains gui_esp32s3_simulator binary + peripheral assets.'
            printf '%s\n' '- See qemu-binary-status.txt for bundled QEMU binary availability.'
            printf '%s\n' '- If QEMU is not bundled, set ESP32S3_QEMU_BIN before launch.'
          } > "$PKG_ROOT/run-info.txt"

      - name: Upload Runtime Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-esp32s3-simulator-${{ matrix.os }}
          path: dist/gui-esp32s3-simulator-${{ runner.os }}
          if-no-files-found: error
