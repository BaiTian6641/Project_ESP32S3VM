name: Release GUI + ESP32S3 QEMU

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    env:
      GUI_BUILD_DIR: gui-esp32s3-simulator/build-release
      QEMU_REPO: https://github.com/BaiTian6641/qemu.git
      QEMU_DIR: qemu-upstream

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (Windows/macOS)
        if: runner.os == 'Windows' || runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'

      - name: Install GUI dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev

      - name: Build GUI
        shell: bash
        run: |
          set -euo pipefail
          cmake -E rm -rf "${{ env.GUI_BUILD_DIR }}"
          cmake -S gui-esp32s3-simulator -B "${{ env.GUI_BUILD_DIR }}" -DCMAKE_BUILD_TYPE=Release
          cmake --build "${{ env.GUI_BUILD_DIR }}" --config Release -j 4

      - name: Install QEMU build dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git make ninja-build pkg-config python3 python3-pip \
            libglib2.0-dev libpixman-1-dev zlib1g-dev libgcrypt20-dev libslirp-dev libfdt-dev

      - name: Install QEMU build dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install \
            git make ninja pkg-config python meson \
            glib pixman libslirp libgcrypt dtc

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libgcrypt
            mingw-w64-x86_64-libslirp
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-diffutils
            mingw-w64-x86_64-pkgconf

      - name: Dependency preflight (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          pkg-config --modversion glib-2.0
          pkg-config --modversion pixman-1
          pkg-config --modversion zlib
          pkg-config --modversion libgcrypt
          pkg-config --modversion slirp
          pkg-config --cflags slirp
          pkg-config --libs slirp

      - name: Dependency preflight (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          ninja --version
          pkg-config --modversion glib-2.0
          pkg-config --modversion pixman-1
          pkg-config --modversion zlib
          pkg-config --modversion libgcrypt
          pkg-config --modversion slirp
          pkg-config --cflags slirp
          pkg-config --libs slirp

      - name: Dependency preflight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          BREW_PREFIX="$(brew --prefix)"
          LIBGCRYPT_PREFIX="$(brew --prefix libgcrypt)"
          export PKG_CONFIG_PATH="$LIBGCRYPT_PREFIX/lib/pkgconfig:$BREW_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          ninja --version
          test -f "$LIBGCRYPT_PREFIX/include/gcrypt.h"
          pkg-config --modversion glib-2.0
          pkg-config --modversion pixman-1
          pkg-config --modversion zlib
          pkg-config --modversion libgcrypt
          pkg-config --cflags libgcrypt
          pkg-config --libs libgcrypt
          pkg-config --modversion slirp
          pkg-config --cflags slirp
          pkg-config --libs slirp

      - name: Build ESP32S3 QEMU (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          # Ensure QEMU's required Python tooling exists before configure.
          python3 -m pip install --upgrade pip
          python3 -m pip install meson==1.5.0 pycotap==1.3.1

          git clone --depth 1 --recurse-submodules --shallow-submodules "${{ env.QEMU_REPO }}" "${{ env.QEMU_DIR }}"
          cd "${{ env.QEMU_DIR }}"
          git submodule update --init --recursive

          # This fork builds slirp.c; force-enable and link libslirp explicitly.
          SLIRP_CFLAGS="$(pkg-config --cflags slirp)"
          SLIRP_LIBS="$(pkg-config --libs slirp)"

          ./configure \
            --target-list=xtensa-softmmu \
            --disable-werror \
            --disable-xen \
            --enable-slirp \
            --disable-docs \
            --disable-tools \
            --disable-gtk \
            --disable-sdl \
            --disable-curses \
            --disable-opengl \
            --disable-guest-agent \
            --extra-cflags="$SLIRP_CFLAGS" \
            --extra-ldflags="$SLIRP_LIBS" \
            -Dslirp=enabled \
            -Dguest_agent=disabled || { cat build/meson-logs/meson-log.txt || true; exit 1; }
          meson configure build -Dslirp=enabled -Dguest_agent=disabled

          if grep -q '^#define CONFIG_SLIRP' build/config-host.h; then
            echo '[configure] slirp is enabled on Linux build'
            grep '^#define CONFIG_.*SLIRP' build/config-host.h || true
          else
            echo '[configure] slirp is NOT enabled on Linux build; forcing this build to fail early'
            grep '^#define CONFIG_.*SLIRP' build/config-host.h || true
            exit 1
          fi
          make -j"$(nproc)" qemu-system-xtensa
          test -x build/qemu-system-xtensa

      - name: Verify ESP32S3 machine support (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ env.QEMU_DIR }}"
          ./build/qemu-system-xtensa -machine help | grep -i esp32s3

      - name: Build ESP32S3 QEMU (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail

          # Ensure QEMU's required Python tooling exists before configure.
          # This avoids mkvenv offline wheel lookup failures when python/wheels is unavailable.
          python3 -m pip --version || python3 -m ensurepip --upgrade || true
          python3 -m pip install --upgrade pip
          python3 -m pip install meson==1.5.0 pycotap==1.3.1

          git clone --depth 1 --recurse-submodules --shallow-submodules "${{ env.QEMU_REPO }}" "${{ env.QEMU_DIR }}"
          cd "${{ env.QEMU_DIR }}"
          git submodule update --init --recursive

          # Meson runs on native Windows Python here, so use a native absolute prefix path.
          MESON_PREFIX="$(cygpath -m "$PWD/install-root")"

          # This fork builds slirp.c; force-enable and link libslirp explicitly.
          SLIRP_CFLAGS="$(pkg-config --cflags slirp)"
          SLIRP_LIBS="$(pkg-config --libs slirp)"

          ./configure \
            --target-list=xtensa-softmmu \
            --prefix="$MESON_PREFIX" \
            --disable-werror \
            --disable-xen \
            --enable-slirp \
            --disable-docs \
            --disable-tools \
            --disable-gtk \
            --disable-sdl \
            --disable-curses \
            --disable-opengl \
            --disable-guest-agent \
            --extra-cflags="$SLIRP_CFLAGS" \
            --extra-ldflags="$SLIRP_LIBS" \
            -Dslirp=enabled \
            -Dguest_agent=disabled || { cat build/meson-logs/meson-log.txt || true; exit 1; }
          meson configure build -Dslirp=enabled -Dguest_agent=disabled

          if grep -q '^#define CONFIG_SLIRP' build/config-host.h; then
            echo '[configure] slirp is enabled on Windows build'
            grep '^#define CONFIG_.*SLIRP' build/config-host.h || true
          else
            echo '[configure] slirp is NOT enabled on Windows build; forcing this build to fail early'
            grep '^#define CONFIG_.*SLIRP' build/config-host.h || true
            exit 1
          fi
          make -j"$(nproc)" qemu-system-xtensa.exe
          test -f build/qemu-system-xtensa.exe

      - name: Verify ESP32S3 machine support (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "${{ env.QEMU_DIR }}"
          test -f ./build/qemu-system-xtensa.exe
          ls -l ./build/qemu-system-xtensa.exe

      - name: Build ESP32S3 QEMU (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          BREW_PREFIX="$(brew --prefix)"
          LIBGCRYPT_PREFIX="$(brew --prefix libgcrypt)"
          export PKG_CONFIG_PATH="$LIBGCRYPT_PREFIX/lib/pkgconfig:$BREW_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CPPFLAGS="-I$LIBGCRYPT_PREFIX/include ${CPPFLAGS:-}"
          export LDFLAGS="-L$LIBGCRYPT_PREFIX/lib ${LDFLAGS:-}"

          python3 -m pip install --upgrade pip
          python3 -m pip install meson==1.5.0 pycotap==1.3.1

          git clone --depth 1 --recurse-submodules --shallow-submodules "${{ env.QEMU_REPO }}" "${{ env.QEMU_DIR }}"
          cd "${{ env.QEMU_DIR }}"
          git submodule update --init --recursive

          SLIRP_CFLAGS="$(pkg-config --cflags slirp)"
          SLIRP_LIBS="$(pkg-config --libs slirp)"
          GCRYPT_CFLAGS="$(pkg-config --cflags libgcrypt)"
          GCRYPT_LIBS="$(pkg-config --libs libgcrypt)"
          EXTRA_CFLAGS="$SLIRP_CFLAGS $GCRYPT_CFLAGS -I$LIBGCRYPT_PREFIX/include"
          EXTRA_LDFLAGS="$SLIRP_LIBS $GCRYPT_LIBS -L$LIBGCRYPT_PREFIX/lib"

          echo "[macOS] libgcrypt include: $LIBGCRYPT_PREFIX/include/gcrypt.h"
          ls -l "$LIBGCRYPT_PREFIX/include/gcrypt.h"

          ./configure \
            --target-list=xtensa-softmmu \
            --disable-werror \
            --disable-xen \
            --enable-slirp \
            --disable-docs \
            --disable-tools \
            --disable-gtk \
            --disable-sdl \
            --disable-curses \
            --disable-opengl \
            --disable-cocoa \
            --disable-guest-agent \
            --extra-cflags="$EXTRA_CFLAGS" \
            --extra-ldflags="$EXTRA_LDFLAGS" \
            -Dslirp=enabled \
            -Dguest_agent=disabled || { cat build/meson-logs/meson-log.txt || true; exit 1; }
          meson configure build -Dslirp=enabled -Dguest_agent=disabled

          if grep -q '^#define CONFIG_SLIRP' build/config-host.h; then
            echo '[configure] slirp is enabled on macOS build'
            grep '^#define CONFIG_.*SLIRP' build/config-host.h || true
          else
            echo '[configure] slirp is NOT enabled on macOS build; forcing this build to fail early'
            grep '^#define CONFIG_.*SLIRP' build/config-host.h || true
            exit 1
          fi

          JOBS="$(sysctl -n hw.ncpu || echo 4)"
          make -j"$JOBS" qemu-system-xtensa
          test -x build/qemu-system-xtensa

      - name: Verify ESP32S3 machine support (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ env.QEMU_DIR }}"
          test -x ./build/qemu-system-xtensa
          ./build/qemu-system-xtensa -machine help | grep -i esp32s3

      - name: Stage QEMU + DLLs (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          STAGING="qemu-dll-staging"
          mkdir -p "$STAGING"
          cp "${{ env.QEMU_DIR }}/build/qemu-system-xtensa.exe" "$STAGING/"

          # In the MSYS2 MINGW64 shell, /mingw64/bin is on PATH and ldd
          # correctly resolves all MINGW64 DLL paths.  Walk recursively.
          declare -A SEEN_DLLS
          QUEUE=("$STAGING/qemu-system-xtensa.exe")

          while [[ ${#QUEUE[@]} -gt 0 ]]; do
            CURRENT="${QUEUE[0]}"
            QUEUE=("${QUEUE[@]:1}")
            [[ -f "$CURRENT" ]] || continue

            while IFS= read -r dll; do
              [[ -z "$dll" ]] && continue
              case "$dll" in
                /c/[Ww][Ii][Nn][Dd][Oo][Ww][Ss]/*|/C/[Ww][Ii][Nn][Dd][Oo][Ww][Ss]/*) continue ;;
              esac
              dllLower="${dll,,}"
              [[ "$dllLower" == *.dll ]] || continue
              [[ -f "$dll" ]] || continue

              base="$(basename "$dll")"
              [[ -n "${SEEN_DLLS[$base]:-}" ]] && continue

              SEEN_DLLS[$base]=1
              cp "$dll" "$STAGING/$base"
              QUEUE+=("$STAGING/$base")
            done < <(
              ldd "$CURRENT" 2>/dev/null \
                | awk 'BEGIN{IGNORECASE=1}
                       /=>/ && $3 ~ /\.dll$/ {print $3}
                       /^[[:space:]]*\/.*\.dll([[:space:]]|$)/ {print $1}' \
                | sed '/^$/d' | sort -u
            )

            # Resolve "=> not found" entries using MINGW64 PATH.
            while IFS= read -r dep; do
              [[ -z "$dep" ]] && continue
              dep="${dep//$'\r'/}"
              case "$dep" in api-ms-win-*|ext-ms-win-*) continue ;; esac
              dllPath="$(which "$dep" 2>/dev/null || true)"
              if [[ -z "$dllPath" || ! -f "$dllPath" ]]; then
                dllPath="$(find /mingw64/bin -maxdepth 1 -iname "$dep" -print -quit 2>/dev/null || true)"
              fi
              [[ -z "$dllPath" || ! -f "$dllPath" ]] && continue

              base="$(basename "$dllPath")"
              [[ -n "${SEEN_DLLS[$base]:-}" ]] && continue

              SEEN_DLLS[$base]=1
              cp "$dllPath" "$STAGING/$base"
              QUEUE+=("$STAGING/$base")
            done < <(
              ldd "$CURRENT" 2>/dev/null \
                | awk 'BEGIN{IGNORECASE=1} /=> not found/ && $1 ~ /\.dll$/ {print $1}' \
                | sed '/^$/d' | sort -u
            )
          done

          # Deterministic check: ensure core runtime DLLs are present.
          REQUIRED_DLLS=(
            "libglib-2.0-0.dll"
            "libgio-2.0-0.dll"
            "libgmodule-2.0-0.dll"
            "libgobject-2.0-0.dll"
            "libslirp-0.dll"
            "libpixman-1-0.dll"
            "libgcc_s_seh-1.dll"
            "libstdc++-6.dll"
            "libwinpthread-1.dll"
            "zlib1.dll"
            "libintl-8.dll"
            "libiconv-2.dll"
          )
          for dep in "${REQUIRED_DLLS[@]}"; do
            depLower="${dep,,}"
            if [[ -f "$STAGING/$dep" || -f "$STAGING/$depLower" ]]; then continue; fi
            dllPath="$(find /mingw64/bin -maxdepth 1 -iname "$dep" -print -quit 2>/dev/null || true)"
            if [[ -n "$dllPath" && -f "$dllPath" ]]; then
              cp "$dllPath" "$STAGING/$(basename "$dllPath")"
            else
              echo "[stage-dlls] WARNING: required DLL not found: $dep"
            fi
          done

          MISSING=0
          for dep in "${REQUIRED_DLLS[@]}"; do
            depLower="${dep,,}"
            if [[ ! -f "$STAGING/$dep" && ! -f "$STAGING/$depLower" ]]; then
              echo "[stage-dlls] MISSING: $dep"
              MISSING=1
            fi
          done
          if [[ "$MISSING" -ne 0 ]]; then
            echo "[stage-dlls] critical DLLs missing"
            ls -1 "$STAGING"/*.dll 2>/dev/null | sed 's#^.*/##' | sort -u || true
            exit 1
          fi

          # Verify self-contained with bundled DLLs on PATH.
          if PATH="$STAGING:$PATH" ldd "$STAGING/qemu-system-xtensa.exe" \
            | grep -i 'not found' \
            | grep -viE 'api-ms-win-|ext-ms-win-' >/dev/null; then
            echo "[stage-dlls] unresolved DLLs remain:"
            PATH="$STAGING:$PATH" ldd "$STAGING/qemu-system-xtensa.exe" || true
            exit 1
          fi

          echo "[stage-dlls] success — bundled DLLs:"
          ls -1 "$STAGING"/*.dll 2>/dev/null | sed 's#^.*/##' | sort -u || true

      - name: Package runtime bundle
        id: package
        shell: bash
        run: |
          set -euo pipefail

          PKG_NAME="esp32s3-simulator-bundle-${{ runner.os }}"
          PKG_ROOT="dist/${PKG_NAME}"
          mkdir -p "$PKG_ROOT"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            GUI_BIN="${{ env.GUI_BUILD_DIR }}/Release/gui_esp32s3_simulator.exe"
            if [[ ! -f "$GUI_BIN" ]]; then
              GUI_BIN="${{ env.GUI_BUILD_DIR }}/gui_esp32s3_simulator.exe"
            fi
            cp "$GUI_BIN" "$PKG_ROOT/"

            DEPLOY_QT=""
            if command -v windeployqt >/dev/null 2>&1; then
              DEPLOY_QT="windeployqt"
            elif command -v windeployqt6 >/dev/null 2>&1; then
              DEPLOY_QT="windeployqt6"
            else
              echo "windeployqt not found in PATH"
              exit 1
            fi

            "$DEPLOY_QT" --release --no-compiler-runtime --no-translations --dir "$PKG_ROOT" "$PKG_ROOT/gui_esp32s3_simulator.exe"

            test -f "$PKG_ROOT/Qt6Core.dll"
            test -f "$PKG_ROOT/Qt6Gui.dll"
            test -f "$PKG_ROOT/Qt6Widgets.dll"
            test -f "$PKG_ROOT/Qt6Network.dll"
            test -f "$PKG_ROOT/platforms/qwindows.dll"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            GUI_APP="${{ env.GUI_BUILD_DIR }}/gui_esp32s3_simulator.app"
            if [[ ! -d "$GUI_APP" ]]; then
              echo "Expected app bundle not found: $GUI_APP"
              exit 1
            fi

            cp -R "$GUI_APP" "$PKG_ROOT/"

            DEPLOY_QT=""
            if command -v macdeployqt >/dev/null 2>&1; then
              DEPLOY_QT="macdeployqt"
            else
              echo "macdeployqt not found in PATH"
              exit 1
            fi

            "$DEPLOY_QT" "$PKG_ROOT/gui_esp32s3_simulator.app"

            test -d "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks/QtCore.framework"
            test -d "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks/QtGui.framework"
            test -d "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks/QtWidgets.framework"
            test -d "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks/QtNetwork.framework"
          else
            cp "${{ env.GUI_BUILD_DIR }}/gui_esp32s3_simulator" "$PKG_ROOT/"
            chmod +x "$PKG_ROOT/gui_esp32s3_simulator"

            # -- System/glibc libs that must NOT be bundled (must match host glibc) --
            SYSTEM_LIBS_RE='linux-vdso|ld-linux|libc\.so|libm\.so|libdl\.so|libpthread|librt\.so|libresolv|libnss_|libutil\.so'

            # Bundle ALL non-system shared libraries the GUI depends on.
            # This captures Qt6 libs PLUS their transitive deps (libicu, pcre2,
            # double-conversion, xkbcommon, etc.) ensuring out-of-box startup.
            mkdir -p "$PKG_ROOT/lib"
            QT_FOUND=0
            while IFS= read -r so; do
              [[ -z "$so" ]] && continue
              cp -n "$so" "$PKG_ROOT/lib/" 2>/dev/null || true
              if [[ "$(basename "$so")" == libQt6* ]]; then
                QT_FOUND=1
              fi
            done < <(ldd "$PKG_ROOT/gui_esp32s3_simulator" \
              | awk -v skip="$SYSTEM_LIBS_RE" '/=>/ && $3 ~ /^\//' \
              | awk -v skip="$SYSTEM_LIBS_RE" '$3 !~ skip {print $3}' \
              | sed '/^$/d' \
              | sort -u)
            if [[ "$QT_FOUND" -eq 0 ]]; then
              echo "No Qt runtime libraries found via ldd"
              exit 1
            fi

            # Discover Qt plugin directory from qmake or known paths.
            QT_PLUGIN_BASE=""
            if command -v qmake6 >/dev/null 2>&1; then
              QT_PLUGIN_BASE="$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || true)"
            fi
            if [[ -z "$QT_PLUGIN_BASE" || ! -d "$QT_PLUGIN_BASE" ]]; then
              for _cand in /usr/lib/x86_64-linux-gnu/qt6/plugins /usr/lib/qt6/plugins /usr/lib64/qt6/plugins; do
                if [[ -d "$_cand" ]]; then QT_PLUGIN_BASE="$_cand"; break; fi
              done
            fi

            mkdir -p "$PKG_ROOT/plugins/platforms"
            cp "$QT_PLUGIN_BASE/platforms/libqxcb.so" "$PKG_ROOT/plugins/platforms/"

            # Also bundle transitive deps of the XCB platform plugin.
            while IFS= read -r so; do
              [[ -z "$so" ]] && continue
              base="$(basename "$so")"
              [[ -f "$PKG_ROOT/lib/$base" ]] && continue
              cp "$so" "$PKG_ROOT/lib/" 2>/dev/null || true
            done < <(ldd "$PKG_ROOT/plugins/platforms/libqxcb.so" \
              | awk '/=>/ && $3 ~ /^\//' \
              | awk -v skip="$SYSTEM_LIBS_RE" '$3 !~ skip {print $3}' \
              | sed '/^$/d' \
              | sort -u)

            if [[ -d "$QT_PLUGIN_BASE/platformthemes" ]]; then
              mkdir -p "$PKG_ROOT/plugins/platformthemes"
              cp -a "$QT_PLUGIN_BASE/platformthemes/." "$PKG_ROOT/plugins/platformthemes/"
            fi
            if [[ -d "$QT_PLUGIN_BASE/styles" ]]; then
              mkdir -p "$PKG_ROOT/plugins/styles"
              cp -a "$QT_PLUGIN_BASE/styles/." "$PKG_ROOT/plugins/styles/"
            fi

            {
              printf '%s\n' '[Paths]'
              printf '%s\n' 'Prefix=.'
              printf '%s\n' 'Libraries=lib'
              printf '%s\n' 'Plugins=plugins'
            } > "$PKG_ROOT/qt.conf"

            test -f "$PKG_ROOT/lib/libQt6Core.so.6"
            test -f "$PKG_ROOT/lib/libQt6Gui.so.6"
            test -f "$PKG_ROOT/lib/libQt6Widgets.so.6"
            test -f "$PKG_ROOT/lib/libQt6Network.so.6"
            test -f "$PKG_ROOT/plugins/platforms/libqxcb.so"
          fi

          cp -r gui-esp32s3-simulator/peripherals "$PKG_ROOT/"
          cp -r gui-esp32s3-simulator/device-sims "$PKG_ROOT/"
          cp gui-esp32s3-simulator/README.md "$PKG_ROOT/README.gui.md"

          mkdir -p "$PKG_ROOT/qemu"

          # Bundle QEMU data files (ROM binaries) so the machine model can find them.
          # The GUI launcher passes -L <datadir> pointing to qemu/share/qemu/.
          mkdir -p "$PKG_ROOT/qemu/share/qemu"
          if [[ -f "${{ env.QEMU_DIR }}/pc-bios/esp32s3_rev0_rom.bin" ]]; then
            cp "${{ env.QEMU_DIR }}/pc-bios/esp32s3_rev0_rom.bin" "$PKG_ROOT/qemu/share/qemu/"
            echo "[package] bundled esp32s3_rev0_rom.bin from pc-bios"
          elif [[ -f "${{ env.QEMU_DIR }}/build/pc-bios/esp32s3_rev0_rom.bin" ]]; then
            cp "${{ env.QEMU_DIR }}/build/pc-bios/esp32s3_rev0_rom.bin" "$PKG_ROOT/qemu/share/qemu/"
            echo "[package] bundled esp32s3_rev0_rom.bin from build/pc-bios"
          elif [[ -f "${{ env.QEMU_DIR }}/build/share/qemu/esp32s3_rev0_rom.bin" ]]; then
            cp "${{ env.QEMU_DIR }}/build/share/qemu/esp32s3_rev0_rom.bin" "$PKG_ROOT/qemu/share/qemu/"
            echo "[package] bundled esp32s3_rev0_rom.bin from build/share/qemu"
          else
            echo "::warning::esp32s3_rev0_rom.bin not found; .bin firmware loading will fail"
          fi

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Prefer QEMU + DLLs pre-staged by the MSYS2 step (correct MINGW64 context).
            if [[ -d "qemu-dll-staging" ]]; then
              cp qemu-dll-staging/* "$PKG_ROOT/qemu/" 2>/dev/null || true
              echo "[Windows package] loaded pre-staged QEMU DLLs from MSYS2 step"
            else
              cp "${{ env.QEMU_DIR }}/build/qemu-system-xtensa.exe" "$PKG_ROOT/qemu/"
            fi

            # Supplementary DLL walker as safety net (runs in bash/Git-Bash context).
            # Pre-populate SEEN_DLLS with already-staged files to skip duplicates.
            declare -A SEEN_DLLS
            for _f in "$PKG_ROOT/qemu"/*.dll "$PKG_ROOT/qemu"/*.exe; do
              [[ -f "$_f" ]] || continue
              SEEN_DLLS[$(basename "$_f")]=1
            done
            QUEUE=(
              "$PKG_ROOT/qemu/qemu-system-xtensa.exe"
            )
            SEARCH_DIRS=(
              "/mingw64/bin"
              "/ucrt64/bin"
              "/clang64/bin"
              "/c/msys64/mingw64/bin"
              "/c/msys64/ucrt64/bin"
              "/c/msys64/clang64/bin"
              "/d/msys64/mingw64/bin"
              "/d/msys64/ucrt64/bin"
              "/d/msys64/clang64/bin"
              "/d/a/_temp/msys64/mingw64/bin"
              "/d/a/_temp/msys64/ucrt64/bin"
              "/d/a/_temp/msys64/clang64/bin"
              "${{ env.QEMU_DIR }}/build"
              "$PKG_ROOT/qemu"
            )

            resolve_dll_path() {
              local dep="$1"
              local found=""

              for d in "${SEARCH_DIRS[@]}"; do
                [[ -d "$d" ]] || continue
                if [[ -f "$d/$dep" ]]; then
                  found="$d/$dep"
                  break
                fi
                found="$(find "$d" -maxdepth 1 -type f -iname "$dep" -print -quit 2>/dev/null || true)"
                if [[ -n "$found" ]]; then
                  break
                fi
              done

              if [[ -z "$found" ]]; then
                for root in "/c/msys64" "/d/msys64"; do
                  [[ -d "$root" ]] || continue
                  found="$(find "$root" -type f -iname "$dep" -print -quit 2>/dev/null || true)"
                  if [[ -n "$found" ]]; then
                    break
                  fi
                done
              fi

              if [[ -z "$found" ]]; then
                # Fallback for runners where MSYS2 root is not mounted at expected paths.
                winFound="$(cmd.exe //c "where $dep" 2>nul | tr -d '\r' | head -n 1 || true)"
                if [[ -n "$winFound" ]]; then
                  # Convert C:\foo\bar.dll -> /c/foo/bar.dll
                  found="$(printf '%s' "$winFound" | sed -E 's#\\#/#g; s#^([A-Za-z]):#/\L\1#')"
                fi
              fi

              printf '%s' "$found"
            }

            while [[ ${#QUEUE[@]} -gt 0 ]]; do
              CURRENT="${QUEUE[0]}"
              QUEUE=("${QUEUE[@]:1}")

              [[ -f "$CURRENT" ]] || continue

              while IFS= read -r dll; do
                [[ -z "$dll" ]] && continue

                case "$dll" in
                  /c/Windows/*|/c/WINDOWS/*|/C/Windows/*|/C/WINDOWS/*|/windows/*)
                    continue
                    ;;
                esac

                dllLower="${dll,,}"
                if [[ "$dllLower" != *.dll ]]; then
                  continue
                fi

                if [[ ! -f "$dll" ]]; then
                  continue
                fi

                base="$(basename "$dll")"
                if [[ -n "${SEEN_DLLS[$base]:-}" ]]; then
                  continue
                fi

                SEEN_DLLS[$base]=1
                cp "$dll" "$PKG_ROOT/qemu/$base"
                QUEUE+=("$PKG_ROOT/qemu/$base")
              done < <(
                ldd "$CURRENT" 2>/dev/null \
                  | awk '
                      BEGIN { IGNORECASE=1 }
                      /=>/ && $3 ~ /\.dll$/ { print $3 }
                      /^[[:space:]]*\/.*\.dll([[:space:]]|$)/ { print $1 }
                    ' \
                  | sed '/^$/d' \
                  | sort -u
              )

              # Resolve missing deps reported as "name.dll => not found".
              while IFS= read -r dep; do
                [[ -z "$dep" ]] && continue
                dep="${dep//$'\r'/}"
                dep="${dep//$'\n'/}"
                case "$dep" in
                  api-ms-win-*|ext-ms-win-*)
                    # Windows API-set pseudo DLLs are forwarded by the loader.
                    continue
                    ;;
                esac

                dllPath="$(resolve_dll_path "$dep")"
                if [[ -z "$dllPath" || ! -f "$dllPath" ]]; then
                  continue
                fi

                base="$(basename "$dllPath")"
                if [[ -n "${SEEN_DLLS[$base]:-}" ]]; then
                  continue
                fi

                SEEN_DLLS[$base]=1
                cp "$dllPath" "$PKG_ROOT/qemu/$base"
                QUEUE+=("$PKG_ROOT/qemu/$base")
              done < <(
                ldd "$CURRENT" 2>/dev/null \
                  | awk 'BEGIN { IGNORECASE=1 } /=> not found/ && $1 ~ /\.dll$/ { print $1 }' \
                  | sed '/^$/d' \
                  | sort -u
              )
            done

            # Deterministic fallback: ensure core runtime DLLs are bundled.
            REQUIRED_DLLS=(
              "libglib-2.0-0.dll"
              "libgio-2.0-0.dll"
              "libgmodule-2.0-0.dll"
              "libgobject-2.0-0.dll"
              "libslirp-0.dll"
              "libpixman-1-0.dll"
            )

            for dep in "${REQUIRED_DLLS[@]}"; do
              depLower="${dep,,}"
              if [[ -f "$PKG_ROOT/qemu/$dep" || -f "$PKG_ROOT/qemu/$depLower" ]]; then
                continue
              fi

              dllPath="$(resolve_dll_path "$dep")"
              if [[ -z "$dllPath" || ! -f "$dllPath" ]]; then
                echo "[Windows package] required runtime DLL not found: $dep"
                continue
              fi

              base="$(basename "$dllPath")"
              if [[ ! -f "$PKG_ROOT/qemu/$base" ]]; then
                cp "$dllPath" "$PKG_ROOT/qemu/$base"
              fi
            done

            MISSING_REQUIRED=0
            for dep in "${REQUIRED_DLLS[@]}"; do
              depLower="${dep,,}"
              if [[ ! -f "$PKG_ROOT/qemu/$dep" && ! -f "$PKG_ROOT/qemu/$depLower" ]]; then
                echo "[Windows package] still missing required DLL: $dep"
                MISSING_REQUIRED=1
              fi
            done
            if [[ "$MISSING_REQUIRED" -ne 0 ]]; then
              echo "[Windows package] required QEMU runtime DLL set incomplete"
              ls -1 "$PKG_ROOT/qemu"/*.dll 2>/dev/null | sed 's#^.*/##' | sort -u || true
              exit 1
            fi

            # Hard-fail if any direct QEMU deps are unresolved.
            if PATH="$PKG_ROOT/qemu:$PATH" ldd "$PKG_ROOT/qemu/qemu-system-xtensa.exe" \
              | grep -i 'not found' \
              | grep -viE 'api-ms-win-|ext-ms-win-' >/dev/null; then
              echo "[Windows package] unresolved DLL dependencies for qemu-system-xtensa.exe"
              PATH="$PKG_ROOT/qemu:$PATH" ldd "$PKG_ROOT/qemu/qemu-system-xtensa.exe" || true
              exit 1
            fi

            # Helpful visibility in CI logs.
            echo "[Windows package] msys runtime search roots:" 
            for d in "${SEARCH_DIRS[@]}"; do
              [[ -d "$d" ]] && echo "  - $d"
            done
            ls -1 "$PKG_ROOT/qemu"/*.dll 2>/dev/null | sed 's#^.*/##' | sort -u || true
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            cp "${{ env.QEMU_DIR }}/build/qemu-system-xtensa" "$PKG_ROOT/qemu/"
            chmod +x "$PKG_ROOT/qemu/qemu-system-xtensa"
            mkdir -p "$PKG_ROOT/qemu/lib"

            # Bundle non-system dylibs needed by qemu-system-xtensa (first level).
            while IFS= read -r dylib; do
              [[ -z "$dylib" ]] && continue
              if [[ -f "$dylib" ]]; then
                cp "$dylib" "$PKG_ROOT/qemu/lib/"
                install_name_tool -change "$dylib" "@loader_path/lib/$(basename "$dylib")" "$PKG_ROOT/qemu/qemu-system-xtensa" || true
              fi
            done < <(otool -L "$PKG_ROOT/qemu/qemu-system-xtensa" \
              | awk 'NR>1 {print $1}' \
              | grep -E '^(/opt/homebrew|/usr/local)/' \
              | sort -u)

            # Recursively resolve transitive Homebrew dylib dependencies
            # until no new libraries are discovered (handles arbitrary depth).
            _DYLIB_CHANGED=1
            while [[ "$_DYLIB_CHANGED" -ne 0 ]]; do
              _DYLIB_CHANGED=0
              for lib in "$PKG_ROOT"/qemu/lib/*.dylib; do
                [[ -f "$lib" ]] || continue
                install_name_tool -id "@loader_path/$(basename "$lib")" "$lib" || true
                while IFS= read -r dep; do
                  [[ -z "$dep" ]] && continue
                  depBase="$(basename "$dep")"
                  if [[ ! -f "$PKG_ROOT/qemu/lib/$depBase" && -f "$dep" ]]; then
                    cp "$dep" "$PKG_ROOT/qemu/lib/$depBase"
                    _DYLIB_CHANGED=1
                  fi
                  if [[ -f "$PKG_ROOT/qemu/lib/$depBase" ]]; then
                    install_name_tool -change "$dep" "@loader_path/$depBase" "$lib" || true
                  fi
                done < <(otool -L "$lib" \
                  | awk 'NR>1 {print $1}' \
                  | grep -E '^(/opt/homebrew|/usr/local)/' \
                  | sort -u)
              done
            done

            # Re-pass qemu binary to rewrite any remaining absolute Homebrew refs.
            while IFS= read -r dep; do
              [[ -z "$dep" ]] && continue
              depBase="$(basename "$dep")"
              if [[ -f "$PKG_ROOT/qemu/lib/$depBase" ]]; then
                install_name_tool -change "$dep" "@loader_path/lib/$depBase" "$PKG_ROOT/qemu/qemu-system-xtensa" || true
              fi
            done < <(otool -L "$PKG_ROOT/qemu/qemu-system-xtensa" \
              | awk 'NR>1 {print $1}' \
              | grep -E '^(/opt/homebrew|/usr/local)/' \
              | sort -u)

            # Re-sign binaries after install_name_tool changes to avoid
            # "app is damaged/corrupt" launch errors due invalid signatures.
            codesign --force --sign - "$PKG_ROOT/qemu/qemu-system-xtensa"
            for lib in "$PKG_ROOT"/qemu/lib/*.dylib; do
              [[ -f "$lib" ]] || continue
              codesign --force --sign - "$lib"
            done

            APP_BIN="$PKG_ROOT/gui_esp32s3_simulator.app/Contents/MacOS/gui_esp32s3_simulator"
            if [[ -x "$APP_BIN" ]]; then
              codesign --force --sign - "$APP_BIN"
            fi

            # Sign every nested dylib/framework binary inside the app bundle
            # BEFORE the deep bundle sign.  macdeployqt copies Qt plugins
            # (e.g. tls/libqsecuretransportbackend.dylib) that may have
            # invalid or missing signatures; --deep fails if any sub-component
            # is unsigned.
            while IFS= read -r nested; do
              codesign --force --sign - "$nested" 2>/dev/null || true
            done < <(find "$PKG_ROOT/gui_esp32s3_simulator.app" \
              \( -name '*.dylib' -o -name '*.so' -o -name '*.framework' \) \
              -type f 2>/dev/null | sort)
            # Also sign framework executables inside .framework bundles.
            while IFS= read -r fwbin; do
              codesign --force --sign - "$fwbin" 2>/dev/null || true
            done < <(find "$PKG_ROOT/gui_esp32s3_simulator.app/Contents/Frameworks" \
              -type f -perm +111 ! -name '*.plist' ! -name '*.h' 2>/dev/null | sort)

            codesign --force --deep --sign - "$PKG_ROOT/gui_esp32s3_simulator.app"
          else
            cp "${{ env.QEMU_DIR }}/build/qemu-system-xtensa" "$PKG_ROOT/qemu/"
            chmod +x "$PKG_ROOT/qemu/qemu-system-xtensa"
            mkdir -p "$PKG_ROOT/qemu/lib"

            # Bundle Linux shared libraries used by QEMU.
            # Filter out glibc/system libs — bundling a mismatched libc causes segfaults.
            SYSTEM_LIBS_RE='linux-vdso|ld-linux|libc\.so|libm\.so|libdl\.so|libpthread|librt\.so|libresolv|libnss_|libutil\.so'
            while IFS= read -r so; do
              [[ -z "$so" ]] && continue
              if [[ -f "$so" ]]; then
                cp "$so" "$PKG_ROOT/qemu/lib/"
              fi
            done < <(ldd "$PKG_ROOT/qemu/qemu-system-xtensa" \
              | awk '/=>/ && $3 ~ /^\//' \
              | awk -v skip="$SYSTEM_LIBS_RE" '$3 !~ skip {print $3}' \
              | sed '/^$/d' \
              | sort -u)
          fi

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            {
              printf '%s\n' '@echo off'
              printf '%s\n' 'setlocal'
              printf '%s\n' 'set "SCRIPT_DIR=%~dp0"'
              printf '%s\n' 'set "ESP32S3_QEMU_BIN=%SCRIPT_DIR%qemu\qemu-system-xtensa.exe"'
              printf '%s\n' 'echo [launcher] Using bundled QEMU: %ESP32S3_QEMU_BIN%'
              printf '%s\n' 'py -3 --version >nul 2>&1 || python --version >nul 2>&1 || echo [launcher] WARNING: Python 3 not found. Device simulators require Python 3.'
              printf '%s\n' '"%SCRIPT_DIR%gui_esp32s3_simulator.exe"'
              printf '%s\n' 'endlocal'
            } > "$PKG_ROOT/run-gui.cmd"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            {
              printf '%s\n' '#!/usr/bin/env bash'
              printf '%s\n' 'set -euo pipefail'
              printf '%s\n' 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"'
              printf '%s\n' 'if [[ -x "$SCRIPT_DIR/qemu/qemu-system-xtensa" ]]; then'
              printf '%s\n' '  export ESP32S3_QEMU_BIN="$SCRIPT_DIR/qemu/qemu-system-xtensa"'
              printf '%s\n' '  echo "[launcher] Using bundled QEMU: $ESP32S3_QEMU_BIN"'
              printf '%s\n' 'fi'
              printf '%s\n' 'if ! command -v python3 &>/dev/null && ! command -v python &>/dev/null; then'
              printf '%s\n' '  echo "[launcher] WARNING: Python 3 not found. Device simulators require Python 3."'
              printf '%s\n' 'fi'
              printf '%s\n' 'export DYLD_LIBRARY_PATH="$SCRIPT_DIR/qemu/lib:${DYLD_LIBRARY_PATH:-}"'
              printf '%s\n' 'exec "$SCRIPT_DIR/gui_esp32s3_simulator.app/Contents/MacOS/gui_esp32s3_simulator"'
            } > "$PKG_ROOT/run-gui.command"
            chmod +x "$PKG_ROOT/run-gui.command"
          else
            {
              printf '%s\n' '#!/usr/bin/env bash'
              printf '%s\n' 'set -euo pipefail'
              printf '%s\n' 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"'
              printf '%s\n' 'export ESP32S3_QEMU_BIN="$SCRIPT_DIR/qemu/qemu-system-xtensa"'
              printf '%s\n' 'echo "[launcher] Using bundled QEMU: $ESP32S3_QEMU_BIN"'
              printf '%s\n' 'if ! command -v python3 &>/dev/null && ! command -v python &>/dev/null; then'
              printf '%s\n' '  echo "[launcher] WARNING: Python 3 not found. Device simulators require Python 3."'
              printf '%s\n' 'fi'
              printf '%s\n' 'export LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$SCRIPT_DIR/qemu/lib:${LD_LIBRARY_PATH:-}"'
              printf '%s\n' 'exec "$SCRIPT_DIR/gui_esp32s3_simulator"'
            } > "$PKG_ROOT/run-gui.sh"
            chmod +x "$PKG_ROOT/run-gui.sh"
          fi

          {
            printf '%s\n' "Bundle for ${{ runner.os }}"
            printf '%s\n' '- Includes GUI binary, device simulators, peripheral configs, and built ESP32S3 QEMU.'
            printf '%s\n' '- Launch via run-gui.sh (Linux), run-gui.cmd (Windows), or run-gui.command (macOS).'
            printf '%s\n' '- Python 3 is required for device simulator scripts (only stdlib modules needed).'
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              printf '%s\n' '- If macOS marks app as damaged after download, clear quarantine on bundle folder:'
              printf '%s\n' '  xattr -dr com.apple.quarantine .'
            fi
          } > "$PKG_ROOT/run-info.txt"

          ARCHIVE="dist/${PKG_NAME}.zip"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            # Use ditto on macOS to preserve .app bundle symlinks/metadata.
            ditto -c -k --keepParent "$PKG_ROOT" "$ARCHIVE"
          else
            cmake -E tar cfv "$ARCHIVE" --format=zip "$PKG_ROOT"
          fi

          echo "pkg_root=$PKG_ROOT" >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Verify packaged QEMU runtime
        shell: bash
        run: |
          set -euo pipefail
          PKG_ROOT="${{ steps.package.outputs.pkg_root }}"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXE="$PKG_ROOT/qemu/qemu-system-xtensa.exe"
            test -f "$EXE"
            ls -l "$EXE"
            # Verify packaged Windows runtime is self-contained for QEMU.
            if PATH="$PKG_ROOT/qemu:$PATH" ldd "$EXE" | grep -i 'not found' | grep -viE 'api-ms-win-|ext-ms-win-' >/dev/null; then
              echo "[verify] unresolved DLL dependencies after packaging"
              PATH="$PKG_ROOT/qemu:$PATH" ldd "$EXE" || true
              exit 1
            fi
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            APP="$PKG_ROOT/gui_esp32s3_simulator.app"
            test -d "$APP"
            test -d "$APP/Contents/Frameworks/QtCore.framework"
            EXE="$PKG_ROOT/qemu/qemu-system-xtensa"
            test -x "$EXE"
            # Ensure signatures are not left in invalid state after patching.
            codesign --verify --deep --strict "$APP"
            codesign --verify --strict "$EXE"
            DYLD_LIBRARY_PATH="$PKG_ROOT/qemu/lib:${DYLD_LIBRARY_PATH:-}" "$EXE" -machine help | grep -i esp32s3
          else
            EXE="$PKG_ROOT/qemu/qemu-system-xtensa"
            test -x "$EXE"
            LD_LIBRARY_PATH="$PKG_ROOT/qemu/lib:${LD_LIBRARY_PATH:-}" "$EXE" -machine help | grep -i esp32s3
            # Verify GUI binary can resolve all shared libs via the bundled lib/ dir.
            if LD_LIBRARY_PATH="$PKG_ROOT/lib:${LD_LIBRARY_PATH:-}" ldd "$PKG_ROOT/gui_esp32s3_simulator" | grep 'not found'; then
              echo "[verify] GUI binary has unresolved shared library dependencies"
              LD_LIBRARY_PATH="$PKG_ROOT/lib" ldd "$PKG_ROOT/gui_esp32s3_simulator"
              exit 1
            fi
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-bundle
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive }}
